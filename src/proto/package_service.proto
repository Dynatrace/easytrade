syntax = "proto3";

package easytrade.dbadapter.package;

option csharp_namespace = "EasyTrade.DbAdapter.Package.Grpc";
option go_package = "github.com/dynatrace/easytrade/dbadapter/proto";
option java_package = "com.dynatrace.easytrade.dbadapter.package.grpc";
option java_multiple_files = true;

import "google/protobuf/empty.proto";

message PackageMessage {
  string id = 1;
  string name = 2;
  double price = 3;
  string support = 4;
}

message PackagesResponse {
  repeated PackageMessage packages = 1;
}

service PackageService {
  rpc GetPackages(google.protobuf.Empty) returns (PackagesResponse) {}
}
