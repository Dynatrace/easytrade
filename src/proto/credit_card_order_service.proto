syntax = "proto3";

package easytrade.dbadapter.creditcardorder;

option csharp_namespace = "EasyTrade.DbAdapter.CreditCardOrder.Grpc";
option go_package = "github.com/dynatrace/easytrade/dbadapter/proto";
option java_package = "com.dynatrace.easytrade.dbadapter.creditcardorder.grpc";
option java_multiple_files = true;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message CreditCardOrderMessage {
  string id = 1;
  string account_id = 2;
  string email = 3;
  string name = 4;
  string shipping_address = 5;
  string card_level = 6;
  string shipping_id = 7;
}

message CreateCreditCardOrderRequest {
  string id = 1;
  string account_id = 2;
  string email = 3;
  string name = 4;
  string shipping_address = 5;
  string card_level = 6;
}

message GetOrderByAccountIdRequest {
  string account_id = 1;
}

message GetOrderByAccountIdResponse {
  bool found = 1;
  string order_id = 2;
}

message CreditCardOrderStatusMessage {
  string id = 1;
  string credit_card_order_id = 2;
  google.protobuf.Timestamp timestamp = 3;
  string status = 4;
  string details = 5;
}

message GetShippingAddressRequest {
  string order_id = 1;
}

message ShippingAddressMessage {
  string shipping_address = 1;
  string name = 2;
  string email = 3;
}

message GetShippingAddressResponse {
  bool found = 1;
  ShippingAddressMessage shipping_address = 2;
}

message GetCreditCardManufactureDataRequest {
  string order_id = 1;
}

message CreditCardManufactureDataMessage {
  string order_id = 1;
  string name = 2;
  string card_level = 3;
}

message GetCreditCardManufactureDataResponse {
  bool found = 1;
  CreditCardManufactureDataMessage data = 2;
}

message GetOrderStatusListRequest {
  string order_id = 1;
}

message OrderStatusListResponse {
  repeated CreditCardOrderStatusMessage statuses = 1;
}

message GetLastOrderStatusByAccountIdRequest {
  string account_id = 1;
}

message GetLastOrderStatusByAccountIdResponse {
  bool found = 1;
  CreditCardOrderStatusMessage status = 2;
}

message OrdersResponse {
  repeated string order_ids = 1;
}

message InsertNewStatusRequest {
  string order_id = 1;
  string status = 2;
  string details = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message CreditCardMessage {
  string order_id = 1;
  string card_level = 2;
  string card_number = 3;
  string card_cvs = 4;
  google.protobuf.Timestamp card_valid_date = 5;
}

message InsertNewCreditCardRequest {
  string order_id = 1;
  string card_level = 2;
  string card_number = 3;
  string card_cvs = 4;
  google.protobuf.Timestamp card_valid_date = 5;
}

message UpdateOrderShippingIdRequest {
  string order_id = 1;
  string shipping_id = 2;
}

message DeleteOrdersRequest {
  string account_id = 1;
}

service CreditCardOrderService {
  rpc CreateCreditCardOrder(CreateCreditCardOrderRequest) returns (CreditCardOrderMessage) {}

  // found = false when does not exist
  rpc GetOrderByAccountId(GetOrderByAccountIdRequest) returns (GetOrderByAccountIdResponse) {}

  // found = false when does not exist
  rpc GetShippingAddressByOrderId(GetShippingAddressRequest) returns (GetShippingAddressResponse) {}

  // found = false when does not exist
  rpc GetCreditCardManufactureData(GetCreditCardManufactureDataRequest) returns (GetCreditCardManufactureDataResponse) {}

  // Get all order statuses ordered by timestamp DESC
  rpc GetOrderStatusList(GetOrderStatusListRequest) returns (OrderStatusListResponse) {}

  // found = false when does not exist
  rpc GetLastOrderStatusByAccountId(GetLastOrderStatusByAccountIdRequest) returns (GetLastOrderStatusByAccountIdResponse) {}

  // Get all orders with status ORDER_CREATED
  rpc GetOrdersWithStatusOrderCreated(google.protobuf.Empty) returns (OrdersResponse) {}
  rpc InsertNewStatus(InsertNewStatusRequest) returns (CreditCardOrderStatusMessage) {}
  rpc InsertNewCreditCard(InsertNewCreditCardRequest) returns (CreditCardMessage) {}
  rpc UpdateOrderShippingId(UpdateOrderShippingIdRequest) returns (CreditCardOrderMessage) {}
  rpc DeleteOrdersByAccountId(DeleteOrdersRequest) returns (google.protobuf.Empty) {}
}
