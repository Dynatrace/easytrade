syntax = "proto3";

package easytrade.dbadapter.instrument;

option csharp_namespace = "EasyTrade.DbAdapter.Instrument.Grpc";
option go_package = "github.com/dynatrace/easytrade/dbadapter/proto";
option java_package = "com.dynatrace.easytrade.dbadapter.instrument.grpc";
option java_multiple_files = true;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message InstrumentMessage {
  string id = 1;
  string product_id = 2;
  string code = 3;
  string name = 4;
  string description = 5;
}

message OwnedInstrumentMessage {
  string id = 1;
  string account_id = 2;
  string instrument_id = 3;
  double quantity = 4;
  google.protobuf.Timestamp last_modification_date = 5;
}

message GetInstrumentRequest {
  string id = 1;
}

message InstrumentsResponse {
  repeated InstrumentMessage instruments = 1;
}

message GetOwnedInstrumentRequest {
  string account_id = 1;
  string instrument_id = 2;
}

message GetOwnedInstrumentsOfAccountRequest {
  string account_id = 1;
}

message OwnedInstrumentsResponse {
  repeated OwnedInstrumentMessage owned_instruments = 1;
}

message AddOwnedInstrumentRequest {
  string account_id = 1;
  string instrument_id = 2;
  double quantity = 3;
  google.protobuf.Timestamp last_modification_date = 4;
}

message UpdateOwnedInstrumentRequest {
  string id = 1;
  string account_id = 2;
  string instrument_id = 3;
  double quantity = 4;
  google.protobuf.Timestamp last_modification_date = 5;
}

service InstrumentService {
  rpc GetInstrumentById(GetInstrumentRequest) returns (InstrumentMessage) {}

  rpc GetAllInstruments(google.protobuf.Empty) returns (InstrumentsResponse) {}

  rpc GetOwnedInstrument(GetOwnedInstrumentRequest) returns (OwnedInstrumentMessage) {}

  // Get all owned instruments for an account
  rpc GetOwnedInstruments(GetOwnedInstrumentsOfAccountRequest) returns (OwnedInstrumentsResponse) {}

  // Create a new owned instrument row and return it (with the assigned id)
  rpc AddOwnedInstrument(AddOwnedInstrumentRequest) returns (OwnedInstrumentMessage) {}
  rpc UpdateOwnedInstrument(UpdateOwnedInstrumentRequest) returns (OwnedInstrumentMessage) {}
}
