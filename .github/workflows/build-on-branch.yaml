name: Build easytrade on branch
on:
  push:
    branches:
      - "**"
      - "!main"
    paths:
      - .github/**
      - kubernetes-manifests/**
      - skaffold.yaml
      - src/**

  workflow_call:
    secrets:
      SNYK_API_TOKEN:
        required: true

env:
  CONTAINER_REGISTRY: europe-docker.pkg.dev/dynatrace-demoability/docker/easytrade

jobs:
  snyk:
    uses: ./.github/workflows/snyk.yaml
    permissions:
      security-events: write
      contents: read
      actions: read
    secrets:
      SNYK_API_TOKEN: ${{ secrets.SNYK_API_TOKEN }}

  calc-version:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate version
        uses: ./.github/actions/calc-version
        with:
          release-branch: main

  build-easytrade:
    runs-on: ubuntu-24.04
    needs: calc-version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build easytrade without pushing to docker repository
        uses: ./.github/actions/build-push-images
        with:
          push: false
          tag: ${{ steps.calc-version.outputs.version }}
          registry: ${{ env.CONTAINER_REGISTRY }}
